<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Candidate Vetting Report — Life On Other Planets?</title>
<meta name="robots" content="noindex">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="supabase-config.js"></script>
<script src="lop-sync.js"></script>
<style>
  :root{ --navy:#0c2340; --ink:#1a2230; --mut:#5a6b85; --line:#d5dbe6; --blue:#2b6cb0; --green:#0a7d5a; }
  *{ box-sizing:border-box; }
  body{ margin:0; background:#e9edf3; color:var(--ink); font-family:'Helvetica Neue',Arial,sans-serif; }
  /* screen-only control bar */
  .bar{ position:sticky; top:0; z-index:5; background:#0c2340; color:#fff; padding:10px 16px; display:flex; gap:10px; align-items:center; flex-wrap:wrap; }
  .bar select{ font:inherit; font-size:14px; padding:7px 10px; border-radius:6px; border:1px solid #2c4a70; background:#12325a; color:#fff; max-width:230px; }
  .bar button{ font:inherit; font-weight:700; font-size:13px; padding:8px 13px; border-radius:6px; cursor:pointer; border:1px solid transparent; }
  .btn-pdf{ background:#4fd8ff; color:#04121e; } .btn-copy{ background:#fff; color:#0c2340; border-color:#b9c4d6; }
  .bar a{ color:#9fb6d6; text-decoration:none; font-size:13px; margin-left:auto; }
  .bar .hint{ color:#9fb6d6; font-size:12px; }
  /* the printable paper */
  .paper{ max-width:760px; margin:22px auto; background:#fff; border:1px solid var(--line); border-radius:6px; box-shadow:0 2px 16px rgba(0,0,0,.1); overflow:hidden; }
  .head{ background:var(--navy); color:#fff; padding:18px 24px; display:flex; align-items:center; gap:14px; }
  .emblem{ width:34px; height:34px; border-radius:50%; border:2px solid #4fd8ff; position:relative; flex:0 0 auto; }
  .emblem span{ position:absolute; inset:8px; border-radius:50%; background:#4fd8ff; }
  .head .t1{ font-size:16px; font-weight:800; letter-spacing:.02em; }
  .head .t2{ font-size:11.5px; color:#9fb6d6; }
  .head .gen{ margin-left:auto; text-align:right; font-size:10px; color:#9fb6d6; }
  .head .gen b{ color:#fff; font-size:12.5px; }
  .body{ padding:20px 24px 24px; }
  .idrow{ display:flex; align-items:baseline; gap:12px; border-bottom:2px solid var(--navy); padding-bottom:9px; margin-bottom:14px; flex-wrap:wrap; }
  .idrow .toi{ font-size:24px; font-weight:800; color:var(--navy); }
  .idrow .ids{ font-size:12.5px; color:var(--mut); }
  .idrow .disp{ margin-left:auto; font-size:11.5px; font-weight:800; color:var(--green); border:1px solid var(--green); border-radius:4px; padding:3px 9px; }
  .cols{ display:flex; gap:20px; margin-bottom:16px; flex-wrap:wrap; }
  .col{ flex:1; min-width:210px; }
  .k{ font-size:10px; font-weight:800; color:var(--mut); text-transform:uppercase; letter-spacing:.05em; padding-bottom:5px; border-bottom:1px solid var(--line); margin-bottom:5px; }
  table.p{ width:100%; border-collapse:collapse; font-size:12.5px; }
  table.p td{ padding:3px 0; } table.p td.v{ text-align:right; font-weight:600; } table.p td.lbl{ color:var(--mut); }
  sup.na{ color:#b98a2a; font-weight:700; cursor:help; }
  .fig{ border:1px solid var(--line); border-radius:5px; background:#fafbfd; padding:7px 9px; margin-bottom:16px; }
  .fig .cap{ font-size:10.5px; color:var(--mut); margin-bottom:3px; }
  #lc{ width:100%; height:120px; display:block; }
  .findh{ font-size:10px; font-weight:800; color:var(--mut); text-transform:uppercase; letter-spacing:.05em; margin-bottom:7px; }
  .fcards{ display:flex; gap:12px; margin-bottom:14px; flex-wrap:wrap; }
  .fcard{ flex:1; min-width:220px; border-radius:6px; padding:10px 12px; }
  .fc-vote{ background:#eef6ff; border:1px solid #cfe1f7; }
  .fc-chk{ background:#f0fbf6; border:1px solid #bfe6d4; }
  .fcard .h{ font-size:11px; color:var(--mut); }
  .fcard .big{ font-size:15px; font-weight:800; color:var(--navy); }
  .cbar{ height:7px; border-radius:4px; background:#d7e3f2; margin:5px 0 3px; overflow:hidden; display:flex; }
  .cbar i{ display:block; height:100%; }
  .chk{ font-size:12px; line-height:1.6; }
  .chk .ok{ color:var(--green); } .chk .flag{ color:#c0631f; }
  .ai{ font-size:12px; line-height:1.55; background:#faf7ef; border:1px solid #ece0c3; border-radius:6px; padding:10px 12px; margin-bottom:14px; }
  .ai b{ color:var(--navy); }
  .ai .item{ margin-top:5px; padding-top:5px; border-top:1px dashed #e4d8bb; }
  .ai .q{ color:var(--mut); font-weight:700; }
  .notes{ border:1px dashed var(--line); border-radius:6px; padding:10px 12px; margin-bottom:14px; font-size:12px; color:var(--mut); min-height:44px; }
  .foot{ border-top:1px solid var(--line); padding-top:9px; font-size:9.5px; color:#8593a8; line-height:1.55; }
  .empty{ color:var(--mut); font-size:12px; }
  @media print{
    body{ background:#fff; } .bar{ display:none; } .paper{ box-shadow:none; border:none; margin:0; max-width:100%; border-radius:0; }
    .fcard,.ai,.fig,.notes{ break-inside:avoid; }
    @page{ margin:14mm; }
  }
</style>
</head>
<body>
  <div class="bar">
    <span class="hint">Candidate:</span>
    <select id="pick"></select>
    <button class="btn-pdf" id="btnPdf">⤓ Save as PDF / Print</button>
    <button class="btn-copy" id="btnCopy">⧉ Copy CTOI row</button>
    <a href="index.html">← back to site</a>
  </div>

  <div class="paper" id="paper">
    <div class="head">
      <div class="emblem"><span></span></div>
      <div>
        <div class="t1">Community Candidate Vetting Report</div>
        <div class="t2">Life On Other Planets? · citizen-science vetting · lifeonotherplanets.space</div>
      </div>
      <div class="gen">Generated<br><b id="genDate">—</b></div>
    </div>
    <div class="body" id="reportBody">
      <p class="empty">Loading candidates…</p>
    </div>
  </div>

<script>
(function(){
  var DECK=[], card=null, cons=null;
  var $=function(id){ return document.getElementById(id); };
  var esc=function(s){ return String(s==null?'':s).replace(/[&<>"]/g,function(c){return{'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c];}); };
  var LY_PER_PC=3.261564;

  function num(x,dec){ return (x==null||isNaN(x))?null:Number(x).toFixed(dec==null?2:dec); }
  function impliedRe(card){
    var note=null; (card.checks||[]).forEach(function(c){ if(c.test==='Implied size')note=c.note; });
    if(note){ var m=note.match(/([\d.]+)\s*Earth/); if(m)return parseFloat(m[1]); }
    return null;
  }
  function sizeCat(r){ if(r==null)return ''; if(r>22)return 'too large — likely stellar'; if(r>10)return 'gas giant'; if(r>3.9)return 'Neptune-like'; if(r>2)return 'mini-Neptune'; if(r>1.25)return 'super-Earth'; return 'rocky, Earth-sized'; }

  function drawLC(f){
    var cv=$('lc'); if(!cv||!f)return; var dpr=Math.min(window.devicePixelRatio||1,2);
    var W=cv.clientWidth, H=120; cv.width=W*dpr; cv.height=H*dpr; var x=cv.getContext('2d'); x.setTransform(dpr,0,0,dpr,0,0); x.clearRect(0,0,W,H);
    var pad=14, mn=Math.min.apply(null,f), mx=Math.max.apply(null,f), sp=(mx-mn)||1e-6;
    x.strokeStyle='#eceff4'; x.lineWidth=1; for(var g=0;g<=3;g++){ var yy=pad+g/3*(H-2*pad); x.beginPath(); x.moveTo(pad,yy); x.lineTo(W-pad,yy); x.stroke(); }
    x.fillStyle='#2b6cb0';
    for(var i=0;i<f.length;i++){ var px=pad+i/(f.length-1)*(W-2*pad), py=pad+(1-(f[i]-mn)/sp)*(H-2*pad); x.beginPath(); x.arc(px,py,1.5,0,6.283); x.fill(); }
  }

  function render(){
    if(!card){ $('reportBody').innerHTML='<p class="empty">Pick a candidate above.</p>'; return; }
    var tid=String(card.tic||'').replace(/^TIC\s*/,'');
    var distPc = card.distance_ly!=null ? num(card.distance_ly/LY_PER_PC,1) : null;
    var rade=impliedRe(card);
    var na='<sup class="na" title="Available from the NASA Exoplanet Archive / ExoFOP for this TIC — not stored locally.">a</sup>';
    var H=''
      + '<div class="idrow"><div class="toi">'+esc(card.id)+'</div>'
      + '<div class="ids">TIC '+esc(tid)+' · RA —'+na+' · Dec —'+na+(card.constellation?' · '+esc(card.constellation):'')+'</div>'
      + '<div class="disp">'+esc(card.disposition||'PC')+' · planet candidate</div></div>'
      + '<div class="cols">'
        + '<div class="col"><div class="k">Host star</div><table class="p">'
          + row('Teff (st_teff)', card.teff!=null?(Math.round(card.teff).toLocaleString()+' K'):'—')
          + row('Radius (st_rad)', '—'+na)
          + row('Distance (st_dist)', distPc!=null?(distPc+' pc'):'—')
          + row('TESS mag (st_tmag)', '—'+na)
        + '</table></div>'
        + '<div class="col"><div class="k">Transit / planet</div><table class="p">'
          + row('Period (pl_orbper)', card.period_days!=null?(card.period_days+' d'):'—')
          + row('Epoch T0 (pl_tranmid)', '—'+na)
          + row('Depth (pl_trandep)', card.depth_ppm!=null?(card.depth_ppm.toLocaleString()+' ppm'):'—')
          + row('Duration (pl_trandurh)', '—'+na)
          + row('Radius (pl_rade)', rade!=null?('~'+rade+' R⊕ '+small(sizeCat(rade))):'—')
        + '</table></div>'
      + '</div>'
      + '<div class="fig"><div class="cap">Phase-folded light curve'+(card.period_days?(' · P = '+card.period_days+' d'):'')+' · '+((card.f||[]).length)+' binned points · source: '+esc(card.source||'TESS')+'</div><canvas id="lc"></canvas></div>'
      + '<div class="findh">Community findings — our contribution</div>'
      + '<div class="fcards">'
        + '<div class="fcard fc-vote" id="voteCard"><div class="h">Crowd classification</div><div class="big" id="voteBig">loading…</div></div>'
        + '<div class="fcard fc-chk"><div class="h">Objective checks</div><div class="chk">'+renderChecks(card)+'</div></div>'
      + '</div>'
      + '<div class="findh">AI Lab dossier</div><div class="ai" id="aiBox"><span class="empty">loading…</span></div>'
      + '<div class="findh">Observer notes</div><div class="notes">—</div>'
      + '<div class="foot">Data: NASA TESS / Exoplanet Archive. Community vetting by citizen scientists via lifeonotherplanets.space — <b>not peer-reviewed and not a confirmation claim</b>; prepared for ExoFOP-TESS / collaborator review. Per-observer votes and AI findings are retained in the project database. '
        + na.replace('title=','data-x=')+' Fields marked <b>a</b> are available from the NASA Exoplanet Archive / ExoFOP for this TIC. · Report ID LOP-'+dstr()+'-'+esc(card.id)+'</div>';
    $('reportBody').innerHTML=H;
    drawLC(card.f);
    loadDb();
  }
  function row(l,v){ return '<tr><td class="lbl">'+l+'</td><td class="v">'+v+'</td></tr>'; }
  function small(s){ return '<span style="font-weight:400;color:#5a6b85;font-size:11px">'+esc(s)+'</span>'; }
  function dstr(){ return $('genDate').textContent.replace(/-/g,'')||'0000'; }

  function renderChecks(card){
    var cs=(card.checks||[]).filter(function(c){ return c.test!=='Implied size'; });
    var impl=(card.checks||[]).filter(function(c){ return c.test==='Implied size'; });
    var out='';
    cs.forEach(function(c){ out+='<div class="'+(c.flag?'flag':'ok')+'">'+(c.flag?'⚠':'✓')+' '+esc(c.test)+'</div>'; });
    impl.forEach(function(c){ out+='<div class="'+(c.flag?'flag':'ok')+'">'+(c.flag?'⚠':'✓')+' '+esc(c.note)+'</div>'; });
    if(!out) out='<div class="ok">✓ No automated red flags recorded.</div>';
    return out;
  }

  function loadDb(){
    if(!(window.LOPSync && LOPSync.enabled)){ voteEmpty('Cloud data off — findings not available in this view.'); $('aiBox').innerHTML='<span class="empty">Cloud data off.</span>'; return; }
    LOPSync.getConsensus(card.id).then(function(c){ cons=c; renderVote(c); }).catch(function(){ voteEmpty('No community votes yet.'); });
    LOPSync.getCandidateFindings(card.id).then(function(list){ renderFindings(list||[]); }).catch(function(){ $('aiBox').innerHTML='<span class="empty">No AI findings yet.</span>'; });
  }
  function voteEmpty(msg){ var b=$('voteBig'); if(b){ b.innerHTML='<span style="font-size:12px;font-weight:500;color:#5a6b85">'+esc(msg)+'</span>'; } }
  function renderVote(c){
    var big=$('voteBig'); if(!big)return;
    if(!c||!c.votes){ voteEmpty('You’re among the first — no consensus yet.'); return; }
    var v=c.votes,p=c.planet_votes||0,n=c.not_votes||0,u=c.unsure_votes||0,voters=c.voters||v;
    var reached=voters>=5 && Math.max(p,n)/v>=0.7;
    big.innerHTML=Math.round(p/v*100)+'% planet <span style="font-size:11px;font-weight:500;color:#5a6b85">· '+voters+' observer'+(voters>1?'s':'')+'</span>'
      + '<div class="cbar"><i style="width:'+(p/v*100)+'%;background:#2b6cb0"></i><i style="width:'+(n/v*100)+'%;background:#c96b4a"></i><i style="width:'+(u/v*100)+'%;background:#9aa6bd"></i></div>'
      + '<div style="font-size:10.5px;color:'+(reached?'#0a7d5a':'#5a6b85')+'">'+(reached?'Consensus reached — advancing':'Building consensus')+' · Not '+Math.round(n/v*100)+'% · Unsure '+Math.round(u/v*100)+'%</div>';
  }
  function renderFindings(list){
    var box=$('aiBox'); if(!box)return;
    if(!list.length){ box.innerHTML='<span class="empty">No AI Lab findings recorded for this candidate yet.</span>'; return; }
    var out='<b>'+list.length+' finding'+(list.length>1?'s':'')+'</b> gathered by explorers with AI assistants:';
    list.forEach(function(f){
      var pl=f.payload||{}; var q=(f.mode||'').replace(/^check:/,'');
      var summary = pl.summary || pl.answer || pl.finding || pl.verdict || (typeof pl==='string'?pl:'');
      if(!summary && typeof pl==='object'){ try{ summary=JSON.stringify(pl).slice(0,180); }catch(e){} }
      out+='<div class="item"><span class="q">'+esc(q||'note')+'</span> — '+esc(String(summary).slice(0,240))+' <span style="color:#8a6d2a">('+esc(f.model||'AI')+')</span></div>';
    });
    box.innerHTML=out;
  }

  function copyCTOI(){
    if(!card){ return; }
    var tid=String(card.tic||'').replace(/^TIC\s*/,'');
    var distPc = card.distance_ly!=null ? (card.distance_ly/LY_PER_PC).toFixed(2) : '';
    var rade=impliedRe(card);
    var v = cons||{}; var votes=v.votes||0, voters=v.voters||0, p=v.planet_votes||0;
    var pct = votes? Math.round(p/votes*100)+'%' : '';
    var cols=['tid','toi','ra','dec','st_tmag','st_teff','st_rad','st_dist','pl_orbper','pl_tranmid','pl_trandep','pl_trandurh','pl_rade','tfopwg_disp','lop_observers','lop_pct_planet','lop_report'];
    var vals=[tid, card.id, '', '', '', card.teff!=null?Math.round(card.teff):'', '', distPc, card.period_days!=null?card.period_days:'', '', card.depth_ppm!=null?card.depth_ppm:'', '', rade!=null?rade:'', card.disposition||'PC', voters, pct, 'LOP-'+dstr()+'-'+card.id];
    var tsv=cols.join('\t')+'\n'+vals.join('\t');
    (navigator.clipboard&&navigator.clipboard.writeText? navigator.clipboard.writeText(tsv):Promise.reject())
      .then(function(){ flash('Copied — paste into a spreadsheet or the ExoFOP bulk uploader'); })
      .catch(function(){ window.prompt('Copy the CTOI row (Ctrl/Cmd-C):', tsv); });
  }
  function flash(msg){ var b=$('btnCopy'); var t=b.textContent; b.textContent='✓ '+msg; setTimeout(function(){ b.textContent=t; }, 2600); }

  // ---- boot ----
  var now = document.lastModified ? new Date(document.lastModified) : null;
  $('genDate').textContent = (function(){ var d=new Date(); return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0'); })();
  $('btnPdf').onclick=function(){ window.print(); };
  $('btnCopy').onclick=copyCTOI;
  $('pick').onchange=function(){ var id=this.value; card=DECK.filter(function(c){return c.id===id;})[0]||null; cons=null; render(); var u=new URL(location.href); u.searchParams.set('id',id); history.replaceState(null,'',u); };

  fetch('frontier_curves.json',{cache:'no-store'}).then(function(r){ return r.ok?r.json():[]; }).then(function(d){
    DECK=(Array.isArray(d)?d:[]).filter(function(c){ return c&&c.id&&Array.isArray(c.f); });
    DECK.sort(function(a,b){ return String(a.id).localeCompare(String(b.id)); });
    var sel=$('pick'); sel.innerHTML=DECK.map(function(c){ return '<option value="'+esc(c.id)+'">'+esc(c.id)+(c.constellation?(' · '+esc(c.constellation)):'')+'</option>'; }).join('');
    var want=new URL(location.href).searchParams.get('id');
    var start = (want && DECK.filter(function(c){return c.id===want;})[0]) ? want : (DECK[0]&&DECK[0].id);
    if(start){ sel.value=start; card=DECK.filter(function(c){return c.id===start;})[0]; render(); }
    else { $('reportBody').innerHTML='<p class="empty">No real candidates available.</p>'; }
  }).catch(function(){ $('reportBody').innerHTML='<p class="empty">Could not load the candidate deck.</p>'; });
})();
</script>
</body>
</html>
