<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Candidate Vetting Report — Life On Other Planets?</title>
<meta name="robots" content="noindex">
<link rel="icon" href="assets/app-icon.svg">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="supabase-config.js"></script>
<script src="lop-sync.js"></script>
<script src="readiness.js"></script>
<style>
  :root{ --navy:#0c2340; --ink:#1a2230; --mut:#5a6b85; --line:#d5dbe6; --blue:#2b6cb0; --green:#0a7d5a; }
  *{ box-sizing:border-box; }
  body{ margin:0; background:#e9edf3; color:var(--ink); font-family:'Helvetica Neue',Arial,sans-serif; }
  /* screen-only control bar */
  .bar{ position:sticky; top:0; z-index:5; background:#0c2340; color:#fff; padding:10px 16px; display:flex; gap:10px; align-items:center; flex-wrap:wrap; }
  .bar select{ font:inherit; font-size:14px; padding:7px 10px; border-radius:6px; border:1px solid #2c4a70; background:#12325a; color:#fff; max-width:230px; }
  .bar button{ font:inherit; font-weight:700; font-size:13px; padding:8px 13px; border-radius:6px; cursor:pointer; border:1px solid transparent; }
  .btn-pdf{ background:#4fd8ff; color:#04121e; } .btn-copy{ background:#fff; color:#0c2340; border-color:#b9c4d6; }
  .bar a{ color:#9fb6d6; text-decoration:none; font-size:13px; margin-left:auto; }
  .bar .hint{ color:#9fb6d6; font-size:12px; }
  /* the printable paper */
  .paper{ max-width:760px; margin:22px auto; background:#fff; border:1px solid var(--line); border-radius:6px; box-shadow:0 2px 16px rgba(0,0,0,.1); overflow:hidden; }
  .head{ background:var(--navy); color:#fff; padding:18px 24px; display:flex; align-items:center; gap:14px; }
  .emblem{ width:34px; height:34px; border-radius:50%; border:2px solid #4fd8ff; position:relative; flex:0 0 auto; }
  .emblem span{ position:absolute; inset:8px; border-radius:50%; background:#4fd8ff; }
  .head .t1{ font-size:16px; font-weight:800; letter-spacing:.02em; }
  .head .t2{ font-size:11.5px; color:#9fb6d6; }
  .head .gen{ margin-left:auto; text-align:right; font-size:10px; color:#9fb6d6; }
  .head .gen b{ color:#fff; font-size:12.5px; }
  .body{ padding:20px 24px 24px; }
  .idrow{ display:flex; align-items:baseline; gap:12px; border-bottom:2px solid var(--navy); padding-bottom:9px; margin-bottom:14px; flex-wrap:wrap; }
  .idrow .toi{ font-size:24px; font-weight:800; color:var(--navy); }
  .idrow .ids{ font-size:12.5px; color:var(--mut); }
  .idrow .disp{ margin-left:auto; font-size:11.5px; font-weight:800; color:var(--green); border:1px solid var(--green); border-radius:4px; padding:3px 9px; }
  .cols{ display:flex; gap:20px; margin-bottom:16px; flex-wrap:wrap; }
  .col{ flex:1; min-width:210px; }
  .k{ font-size:10px; font-weight:800; color:var(--mut); text-transform:uppercase; letter-spacing:.05em; padding-bottom:5px; border-bottom:1px solid var(--line); margin-bottom:5px; }
  table.p{ width:100%; border-collapse:collapse; font-size:12.5px; }
  table.p td{ padding:3px 0; } table.p td.v{ text-align:right; font-weight:600; } table.p td.lbl{ color:var(--mut); }
  sup.na{ color:#b98a2a; font-weight:700; cursor:help; }
  .fig{ border:1px solid var(--line); border-radius:5px; background:#fafbfd; padding:7px 9px; margin-bottom:16px; }
  .fig .cap{ font-size:10.5px; color:var(--mut); margin-bottom:3px; }
  #lc{ width:100%; height:120px; display:block; }
  .findh{ font-size:10px; font-weight:800; color:var(--mut); text-transform:uppercase; letter-spacing:.05em; margin-bottom:7px; }
  .fcards{ display:flex; gap:12px; margin-bottom:14px; flex-wrap:wrap; }
  .fcard{ flex:1; min-width:220px; border-radius:6px; padding:10px 12px; }
  .fc-vote{ background:#eef6ff; border:1px solid #cfe1f7; }
  .fc-chk{ background:#f0fbf6; border:1px solid #bfe6d4; }
  .fcard .h{ font-size:11px; color:var(--mut); }
  .fcard .big{ font-size:15px; font-weight:800; color:var(--navy); }
  .cbar{ height:7px; border-radius:4px; background:#d7e3f2; margin:5px 0 3px; overflow:hidden; display:flex; }
  .cbar i{ display:block; height:100%; }
  .chk{ font-size:12px; line-height:1.6; }
  .chk .ok{ color:var(--green); } .chk .flag{ color:#c0631f; }
  .ai{ font-size:12px; line-height:1.55; background:#faf7ef; border:1px solid #ece0c3; border-radius:6px; padding:10px 12px; margin-bottom:14px; }
  .ai b{ color:var(--navy); }
  .ai .item{ margin-top:5px; padding-top:5px; border-top:1px dashed #e4d8bb; }
  .ai .q{ color:var(--mut); font-weight:700; }
  .notes{ border:1px dashed var(--line); border-radius:6px; padding:10px 12px; margin-bottom:10px; font-size:12px; color:var(--mut); min-height:44px; }
  .note{ padding:7px 0; border-bottom:1px solid var(--line); }
  .note:last-child{ border-bottom:none; }
  .note .ntxt{ color:var(--ink); font-size:12.5px; line-height:1.5; white-space:pre-wrap; }
  .note .nmeta{ color:var(--mut); font-size:10.5px; margin-top:3px; }
  .noteadd{ display:flex; flex-wrap:wrap; gap:7px; margin:0 0 16px; }
  .noteadd input,.noteadd textarea{ font:inherit; font-size:12.5px; padding:7px 9px; border:1px solid var(--line); border-radius:6px; color:var(--ink); background:#fff; }
  .noteadd input{ flex:0 0 168px; }
  .noteadd textarea{ flex:1; min-width:220px; min-height:52px; resize:vertical; }
  .noteadd button{ flex:0 0 auto; align-self:flex-start; font:inherit; font-weight:700; font-size:12.5px; padding:8px 14px; border-radius:6px; cursor:pointer; border:1px solid transparent; background:var(--navy); color:#fff; }
  .noteadd button:disabled{ opacity:.6; cursor:default; }
  .foot{ border-top:1px solid var(--line); padding-top:9px; font-size:9.5px; color:#8593a8; line-height:1.55; }
  .empty{ color:var(--mut); font-size:12px; }
  .ready-box{ margin:12px 0 16px; }
  .rtier{ display:inline-block; font-weight:800; font-size:13px; padding:5px 12px; border-radius:6px; margin-bottom:8px; }
  .rgates{ display:flex; flex-wrap:wrap; gap:5px 16px; font-size:12px; margin-bottom:7px; }
  .rgate.ok{ color:var(--green); font-weight:600; } .rgate.no{ color:var(--mut); }
  .rverdict{ font-size:12.5px; color:var(--ink); background:#f7f9fc; border:1px solid var(--line); border-radius:6px; padding:8px 11px; line-height:1.5; }
  @media print{
    body{ background:#fff; } .bar{ display:none; } .no-print{ display:none !important; } .paper{ box-shadow:none; border:none; margin:0; max-width:100%; border-radius:0; }
    .fcard,.ai,.fig,.notes{ break-inside:avoid; }
    @page{ margin:14mm; }
  }
</style>
</head>
<body>
  <div class="bar">
    <span class="hint">Candidate:</span>
    <select id="pick"></select>
    <button class="btn-pdf" id="btnPdf">⤓ Save as PDF / Print</button>
    <span id="submitTools" style="display:none;">
      <button class="btn-copy" id="btnCopy">⧉ Copy CTOI row</button>
      <button class="btn-copy" id="btnExport">⤓ Export all findings (CSV)</button>
    </span>
    <span id="submitGate" class="hint">🔒 ExoFOP submission is handled by the project team</span>
    <a href="#" id="ownerToggle">owner</a>
    <a href="reports.html">← dashboard</a>
  </div>

  <div class="paper" id="paper">
    <div class="head">
      <div class="emblem"><span></span></div>
      <div>
        <div class="t1">Community Candidate Vetting Report</div>
        <div class="t2">Life On Other Planets? · citizen-science vetting · lifeonotherplanets.space</div>
      </div>
      <div class="gen">Generated<br><b id="genDate">—</b></div>
    </div>
    <div class="body" id="reportBody">
      <p class="empty">Loading candidates…</p>
    </div>
  </div>

<script>
(function(){
  var DECK=[], card=null, cons=null, aiCount=0, creditNames=[], creditModels=[];
  function uniq(a){ var s={},o=[]; a.forEach(function(x){ x=String(x||'').trim(); if(x && !s[x.toLowerCase()]){ s[x.toLowerCase()]=1; o.push(x); } }); return o; }
  function updateCredits(){ var box=document.getElementById('creditsBox'); if(!box)return;
    var parts=[], obs=(cons&&cons.voters)||0;
    if(obs) parts.push('<b>'+obs+'</b> community observer'+(obs>1?'s':'')+' (crowd classification)');
    if(creditNames.length) parts.push('observer notes by <b>'+creditNames.map(esc).join('</b>, <b>')+'</b>');
    if(creditModels.length) parts.push('AI cross-checks via <b>'+creditModels.map(esc).join('</b>, <b>')+'</b>');
    box.innerHTML = parts.length
      ? ('This candidate’s vetting was contributed by '+parts.join(' · ')+'. Every finding here is community work — credit belongs to the explorers above.')
      : '<span class="empty">No named contributors yet — findings will be credited here as explorers vet this candidate.</span>'; }
  function renderReadiness(){ if(!card||!window.LOPReadiness)return;
    var r=LOPReadiness.evaluate(card, cons||{}, aiCount), lab=LOPReadiness.LABELS[r.tier];
    var badge=$('readyBadge'); if(badge){ badge.style.display='inline-block'; badge.textContent=lab.t+' · '+r.score+'/100'; badge.style.color=lab.c; badge.style.borderColor=lab.c; }
    var box=$('readyBox'); if(!box)return;
    var g=function(ok,label){ return '<div class="rgate '+(ok?'ok':'no')+'">'+(ok?'✓':'○')+' '+label+'</div>'; };
    var verdict = r.tier==='ready' ? 'All gates cleared — generate this report and submit to ExoFOP-TESS.'
      : r.tier==='fp' ? 'Disqualified as a planet — document as a false positive / eclipsing binary, not a discovery.'
      : r.tier==='likely' ? 'Strong candidate — send it to the AI Lab for deep research, then it’s submission-ready.'
      : ('Still building — needs '+(r.needs.join(', ')||'more data')+'.');
    box.innerHTML='<div class="rtier" style="color:'+lab.c+';background:'+lab.bg+'">'+lab.t+' · likelihood '+r.score+'/100</div>'
      + '<div class="rgates">'+g(r.gates.checks,'Automated checks pass')+g(r.gates.crowd,'Crowd consensus ('+r.planetPct+'% planet · '+r.voters+' obs)')+g(r.gates.ai,'AI Lab deep research ('+r.aiCount+')')+g(r.gates.star,'Host star characterized')+'</div>'
      + '<div class="rverdict">'+esc(verdict)+'</div>'; }
  var $=function(id){ return document.getElementById(id); };
  var esc=function(s){ return String(s==null?'':s).replace(/[&<>"]/g,function(c){return{'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c];}); };
  var LY_PER_PC=3.261564;

  function num(x,dec){ return (x==null||isNaN(x))?null:Number(x).toFixed(dec==null?2:dec); }
  function impliedRe(card){
    var note=null; (card.checks||[]).forEach(function(c){ if(c.test==='Implied size')note=c.note; });
    if(note){ var m=note.match(/([\d.]+)\s*Earth/); if(m)return parseFloat(m[1]); }
    return null;
  }
  function sizeCat(r){ if(r==null)return ''; if(r>22)return 'too large — likely stellar'; if(r>10)return 'gas giant'; if(r>3.9)return 'Neptune-like'; if(r>2)return 'mini-Neptune'; if(r>1.25)return 'super-Earth'; return 'rocky, Earth-sized'; }

  function drawLC(f){
    var cv=$('lc'); if(!cv||!f)return; var dpr=Math.min(window.devicePixelRatio||1,2);
    var W=cv.clientWidth, H=120; cv.width=W*dpr; cv.height=H*dpr; var x=cv.getContext('2d'); x.setTransform(dpr,0,0,dpr,0,0); x.clearRect(0,0,W,H);
    var pad=14, mn=Math.min.apply(null,f), mx=Math.max.apply(null,f), sp=(mx-mn)||1e-6;
    x.strokeStyle='#eceff4'; x.lineWidth=1; for(var g=0;g<=3;g++){ var yy=pad+g/3*(H-2*pad); x.beginPath(); x.moveTo(pad,yy); x.lineTo(W-pad,yy); x.stroke(); }
    x.fillStyle='#2b6cb0';
    for(var i=0;i<f.length;i++){ var px=pad+i/(f.length-1)*(W-2*pad), py=pad+(1-(f[i]-mn)/sp)*(H-2*pad); x.beginPath(); x.arc(px,py,1.5,0,6.283); x.fill(); }
  }

  function render(){
    if(!card){ $('reportBody').innerHTML='<p class="empty">Pick a candidate above.</p>'; return; }
    var tid=String(card.tic||'').replace(/^TIC\s*/,'');
    var distPc = card.distance_ly!=null ? num(card.distance_ly/LY_PER_PC,1) : null;
    var rade=impliedRe(card);
    var na='<sup class="na" title="Available from the NASA Exoplanet Archive / ExoFOP for this TIC — not stored locally.">a</sup>';
    var H=''
      + '<div class="idrow"><div class="toi">'+esc(card.id)+'</div>'
      + '<div class="ids">TIC '+esc(tid)+' · RA '+(card.ra!=null?card.ra.toFixed(4)+'°':'—'+na)+' · Dec '+(card.dec!=null?card.dec.toFixed(4)+'°':'—'+na)+(card.constellation?' · '+esc(card.constellation):'')+'</div>'
      + '<div class="disp">'+esc(card.disposition||'PC')+' · planet candidate</div><span class="disp" id="readyBadge" style="display:none;margin-left:6px;"></span></div>'
      + '<div id="readyBox" class="ready-box"></div>'
      + '<div class="cols">'
        + '<div class="col"><div class="k">Host star</div><table class="p">'
          + row('Teff (st_teff)', card.teff!=null?(Math.round(card.teff).toLocaleString()+' K'):'—')
          + row('Radius (st_rad)', card.st_rad!=null?(card.st_rad+' R☉'):('—'+na))
          + row('Distance (st_dist)', distPc!=null?(distPc+' pc'):'—')
          + row('TESS mag (st_tmag)', card.st_tmag!=null?card.st_tmag:('—'+na))
        + '</table></div>'
        + '<div class="col"><div class="k">Transit / planet</div><table class="p">'
          + row('Period (pl_orbper)', card.period_days!=null?(card.period_days+' d'):'—')
          + row('Epoch T0 (pl_tranmid)', card.pl_tranmid!=null?(card.pl_tranmid+' BJD'):('—'+na))
          + row('Depth (pl_trandep)', card.depth_ppm!=null?(card.depth_ppm.toLocaleString()+' ppm'):'—')
          + row('Duration (pl_trandurh)', card.pl_trandurh!=null?(card.pl_trandurh+' h'):('—'+na))
          + row('Radius (pl_rade)', rade!=null?('~'+rade+' R⊕ '+small(sizeCat(rade))):'—')
          + row('Eq. temp (pl_eqt)', card.pl_eqt!=null?(card.pl_eqt+' K'):('—'+na))
        + '</table></div>'
      + '</div>'
      + '<div class="fig"><div class="cap">Phase-folded light curve'+(card.period_days?(' · P = '+card.period_days+' d'):'')+' · '+((card.f||[]).length)+' binned points · source: '+esc(card.source||'TESS')+'</div><canvas id="lc"></canvas></div>'
      + '<div class="findh">Community findings — our contribution</div>'
      + '<div class="fcards">'
        + '<div class="fcard fc-vote" id="voteCard"><div class="h">Crowd classification</div><div class="big" id="voteBig">loading…</div></div>'
        + '<div class="fcard fc-chk"><div class="h">Objective checks</div><div class="chk">'+renderChecks(card)+'</div></div>'
      + '</div>'
      + '<div class="findh">AI Lab dossier</div><div class="ai" id="aiBox"><span class="empty">loading…</span></div>'
      + '<div class="findh">Contributors — credit for this candidate’s vetting</div><div class="ai" id="creditsBox"><span class="empty">Gathering contributors…</span></div>'
      + '<div class="findh">Observer notes</div><div class="notes" id="notesList">—</div>'
      + '<div class="noteadd no-print"><input id="noteAuthor" maxlength="60" placeholder="Your name (optional)"><textarea id="noteText" maxlength="1200" placeholder="Add a vetting note — what you checked, why it looks promising, any caveats…"></textarea><button id="noteSave">Add note</button></div>'
      + '<div class="foot">Data: NASA TESS / Exoplanet Archive. Community vetting by citizen scientists via lifeonotherplanets.space — <b>not peer-reviewed and not a confirmation claim</b>; prepared for ExoFOP-TESS / collaborator review. Per-observer votes and AI findings are retained in the project database. '
        + na.replace('title=','data-x=')+' Fields marked <b>a</b> are available from the NASA Exoplanet Archive / ExoFOP for this TIC. · Report ID LOP-'+dstr()+'-'+esc(card.id)+'</div>';
    $('reportBody').innerHTML=H;
    drawLC(card.f);
    aiCount=0; creditNames=[]; creditModels=[]; renderReadiness(); updateCredits();
    loadDb();
    var nb=$('noteSave'); if(nb) nb.onclick=saveNote;
    loadNotes();
  }
  function row(l,v){ return '<tr><td class="lbl">'+l+'</td><td class="v">'+v+'</td></tr>'; }
  function small(s){ return '<span style="font-weight:400;color:#5a6b85;font-size:11px">'+esc(s)+'</span>'; }
  function dstr(){ return $('genDate').textContent.replace(/-/g,'')||'0000'; }

  function renderChecks(card){
    var cs=(card.checks||[]).filter(function(c){ return c.test!=='Implied size'; });
    var impl=(card.checks||[]).filter(function(c){ return c.test==='Implied size'; });
    var out='';
    cs.forEach(function(c){ out+='<div class="'+(c.flag?'flag':'ok')+'">'+(c.flag?'⚠':'✓')+' '+esc(c.test)+'</div>'; });
    impl.forEach(function(c){ out+='<div class="'+(c.flag?'flag':'ok')+'">'+(c.flag?'⚠':'✓')+' '+esc(c.note)+'</div>'; });
    if(!out) out='<div class="ok">✓ No automated red flags recorded.</div>';
    return out;
  }

  function loadDb(){
    if(!(window.LOPSync && LOPSync.enabled)){ voteEmpty('Cloud data off — findings not available in this view.'); $('aiBox').innerHTML='<span class="empty">Cloud data off.</span>'; return; }
    LOPSync.getConsensus(card.id).then(function(c){ cons=c; renderVote(c); renderReadiness(); updateCredits(); }).catch(function(){ voteEmpty('No community votes yet.'); });
    LOPSync.getCandidateFindings(card.id).then(function(list){ renderFindings(list||[]); }).catch(function(){ $('aiBox').innerHTML='<span class="empty">No AI findings yet.</span>'; });
  }
  function voteEmpty(msg){ var b=$('voteBig'); if(b){ b.innerHTML='<span style="font-size:12px;font-weight:500;color:#5a6b85">'+esc(msg)+'</span>'; } }
  function renderVote(c){
    var big=$('voteBig'); if(!big)return;
    if(!c||!c.votes){ voteEmpty('You’re among the first — no consensus yet.'); return; }
    var v=c.votes,p=c.planet_votes||0,n=c.not_votes||0,u=c.unsure_votes||0,voters=c.voters||v;
    var reached=voters>=5 && Math.max(p,n)/v>=0.7;
    big.innerHTML=Math.round(p/v*100)+'% planet <span style="font-size:11px;font-weight:500;color:#5a6b85">· '+voters+' observer'+(voters>1?'s':'')+'</span>'
      + '<div class="cbar"><i style="width:'+(p/v*100)+'%;background:#2b6cb0"></i><i style="width:'+(n/v*100)+'%;background:#c96b4a"></i><i style="width:'+(u/v*100)+'%;background:#9aa6bd"></i></div>'
      + '<div style="font-size:10.5px;color:'+(reached?'#0a7d5a':'#5a6b85')+'">'+(reached?'Consensus reached — advancing':'Building consensus')+' · Not '+Math.round(n/v*100)+'% · Unsure '+Math.round(u/v*100)+'%</div>';
  }
  function renderFindings(list){
    aiCount=(list||[]).length; renderReadiness();
    creditModels=uniq((list||[]).map(function(f){ return f.model; })); updateCredits();
    var box=$('aiBox'); if(!box)return;
    if(!list.length){ box.innerHTML='<span class="empty">No AI Lab findings recorded for this candidate yet.</span>'; return; }
    var out='<b>'+list.length+' finding'+(list.length>1?'s':'')+'</b> gathered by explorers with AI assistants:';
    list.forEach(function(f){
      var pl=f.payload||{}; var q=(f.mode||'').replace(/^check:/,'');
      var summary = pl.summary || pl.answer || pl.finding || pl.verdict || (typeof pl==='string'?pl:'');
      if(!summary && typeof pl==='object'){ try{ summary=JSON.stringify(pl).slice(0,180); }catch(e){} }
      out+='<div class="item"><span class="q">'+esc(q||'note')+'</span> — '+esc(String(summary).slice(0,240))+' <span style="color:#8a6d2a">('+esc(f.model||'AI')+')</span></div>';
    });
    box.innerHTML=out;
  }

  // ---- observer notes: free-text vetting annotations, stored as ai_dossiers rows
  //      (mode 'note:observer') so no new table/SQL is needed. Excluded from the
  //      AI-research readiness gate (that reads only 'check:%' findings). ----
  function loadNotes(){
    var box=$('notesList'); if(!box)return;
    if(!(window.LOPSync && LOPSync.enabled)){ box.innerHTML='<span class="empty">Cloud data off — notes are not available in this view.</span>'; return; }
    LOPSync.getDossiers(card.id, 'note:observer').then(function(list){ renderNotes(list||[]); }).catch(function(){ renderNotes([]); });
  }
  function renderNotes(list){
    var box=$('notesList'); if(!box)return;
    creditNames=uniq((list||[]).map(function(r){ return (r.payload||{}).author; }).filter(function(a){ return a && a!=='Anonymous observer'; })); updateCredits();
    if(!list.length){ box.innerHTML='<span class="empty">No observer notes yet — add the first one below.</span>'; return; }
    box.innerHTML=list.map(function(r){
      var p=r.payload||{}, txt=p.summary||p.note||'', who=p.author||'Anonymous observer', d=String(r.created_at||'').slice(0,10);
      return '<div class="note"><div class="ntxt">'+esc(txt)+'</div><div class="nmeta">— '+esc(who)+(d?' · '+d:'')+'</div></div>';
    }).join('');
  }
  function saveNote(){
    if(!card)return;
    if(!(window.LOPSync && LOPSync.enabled)){ alert('Cloud data is off in this deployment — notes cannot be saved here.'); return; }
    var ta=$('noteText'), au=$('noteAuthor'), btn=$('noteSave');
    var txt=(ta.value||'').trim(); if(!txt){ ta.focus(); return; }
    txt=txt.slice(0,1200); var who=(au.value||'').trim().slice(0,60);
    var t0=btn.textContent; btn.disabled=true; btn.textContent='Saving…';
    LOPSync.ensureExplorer(who||'Observer','stargazer','#2b6cb0').then(function(){
      return LOPSync.saveDossier(card.id, 'note:observer', 'observer', { summary: txt, author: who||'Anonymous observer' });
    }).then(function(id){
      ta.value=''; btn.textContent = id? '✓ Added' : 'Slow down a moment';
      setTimeout(function(){ btn.textContent=t0; btn.disabled=false; }, 1900);
      loadNotes();
    }).catch(function(){ btn.textContent='Failed — retry'; btn.disabled=false; });
  }

  function copyCTOI(){
    if(!card){ return; }
    var tid=String(card.tic||'').replace(/^TIC\s*/,'');
    var distPc = card.distance_ly!=null ? (card.distance_ly/LY_PER_PC).toFixed(2) : '';
    var rade=impliedRe(card);
    var v = cons||{}; var votes=v.votes||0, voters=v.voters||0, p=v.planet_votes||0;
    var pct = votes? Math.round(p/votes*100)+'%' : '';
    var cols=['tid','toi','ra','dec','st_tmag','st_teff','st_rad','st_dist','pl_orbper','pl_tranmid','pl_trandep','pl_trandurh','pl_rade','tfopwg_disp','lop_observers','lop_pct_planet','lop_report'];
    var vals=[tid, card.id, card.ra!=null?card.ra:'', card.dec!=null?card.dec:'', card.st_tmag!=null?card.st_tmag:'', card.teff!=null?Math.round(card.teff):'', card.st_rad!=null?card.st_rad:'', distPc, card.period_days!=null?card.period_days:'', card.pl_tranmid!=null?card.pl_tranmid:'', card.depth_ppm!=null?card.depth_ppm:'', card.pl_trandurh!=null?card.pl_trandurh:'', rade!=null?rade:'', card.disposition||'PC', voters, pct, 'LOP-'+dstr()+'-'+card.id];
    var tsv=cols.join('\t')+'\n'+vals.join('\t');
    (navigator.clipboard&&navigator.clipboard.writeText? navigator.clipboard.writeText(tsv):Promise.reject())
      .then(function(){ flash('Copied — paste into a spreadsheet or the ExoFOP bulk uploader'); })
      .catch(function(){ window.prompt('Copy the CTOI row (Ctrl/Cmd-C):', tsv); });
  }
  function flash(msg){ var b=$('btnCopy'); var t=b.textContent; b.textContent='✓ '+msg; setTimeout(function(){ b.textContent=t; }, 2600); }

  // ---- bulk export: every candidate that has any community finding ----
  function sbClient(){ try{ var c=window.LOP_SUPABASE||{}; if(c.url&&c.anonKey&&window.supabase&&window.supabase.createClient) return window.supabase.createClient(c.url,c.anonKey); }catch(e){} return null; }
  function csvCell(v){ v=(v==null?'':String(v)); return /[",\n]/.test(v)?'"'+v.replace(/"/g,'""')+'"':v; }
  function download(name,text){ var b=new Blob([text],{type:'text/csv'}); var u=URL.createObjectURL(b),a=document.createElement('a'); a.href=u; a.download=name; document.body.appendChild(a); a.click(); a.remove(); setTimeout(function(){URL.revokeObjectURL(u);},2000); }
  function exportAll(){
    var sb=sbClient(), btn=$('btnExport'), t0=btn.textContent;
    if(!sb){ alert('Cloud data is off in this deployment — no findings to export.'); return; }
    btn.textContent='…exporting';
    Promise.all([ sb.from('card_consensus').select('*'), sb.from('ai_dossiers').select('planet,mode,model,created_at') ]).then(function(res){
      var cons=(res[0]&&res[0].data)||[], ai=(res[1]&&res[1].data)||[];
      var aiCount={}; ai.forEach(function(r){ aiCount[r.planet]=(aiCount[r.planet]||0)+1; });
      var byId={}; DECK.forEach(function(c){ byId[c.id]=c; });
      var ids={}; cons.forEach(function(r){ ids[r.card_id]=1; }); Object.keys(aiCount).forEach(function(k){ ids[k]=1; });
      var cols=['card_id','tic','disposition','period_days','depth_ppm','implied_rade','constellation','voters','votes','pct_planet','pct_not','pct_unsure','consensus_reached','ai_findings'];
      var rows=[cols.join(',')];
      Object.keys(ids).sort().forEach(function(id){
        var c=byId[id]||{}, cc=cons.filter(function(x){return x.card_id===id;})[0]||{};
        var v=cc.votes||0,p=cc.planet_votes||0,n=cc.not_votes||0,u=cc.unsure_votes||0,voters=cc.voters||0;
        var reached=(voters>=5 && v>0 && Math.max(p,n)/v>=0.7)?'yes':'no', re=impliedRe(c);
        rows.push([ id, String(c.tic||'').replace(/^TIC\s*/,''), c.disposition||'', c.period_days!=null?c.period_days:'', c.depth_ppm!=null?c.depth_ppm:'', re!=null?re:'', c.constellation||'', voters, v, v?Math.round(p/v*100):'', v?Math.round(n/v*100):'', v?Math.round(u/v*100):'', reached, aiCount[id]||0 ].map(csvCell).join(','));
      });
      if(rows.length<=1){ alert('No community findings recorded yet — the export will fill in as explorers vet candidates.'); btn.textContent=t0; return; }
      download('LOP-findings-'+$('genDate').textContent+'.csv', rows.join('\n'));
      btn.textContent='✓ exported '+(rows.length-1)+' candidate'+(rows.length-1>1?'s':'');
      setTimeout(function(){ btn.textContent=t0; },3000);
    }).catch(function(e){ alert('Export failed: '+((e&&e.message)||e)); btn.textContent=t0; });
  }

  // ---- boot ----
  var now = document.lastModified ? new Date(document.lastModified) : null;
  $('genDate').textContent = (function(){ var d=new Date(); return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0'); })();
  $('btnPdf').onclick=function(){ window.print(); };
  $('btnCopy').onclick=copyCTOI;
  $('btnExport').onclick=exportAll;

  // ---- owner submit-gate: anyone can VIEW/print a report, but the ExoFOP submit
  //      actions (Copy CTOI row / Export findings) are gated to the project owner.
  //      Soft gate — deters casual or duplicate submissions of others' work; a hard
  //      gate would need real sign-in. Unlock via ?owner=1 or the passphrase. ----
  function isOwner(){ try{ return localStorage.getItem('lop_owner')==='1'; }catch(e){ return false; } }
  if(new URLSearchParams(location.search).get('owner')==='1'){ try{ localStorage.setItem('lop_owner','1'); }catch(e){} }
  function applyOwnerUI(){ var on=isOwner();
    if($('submitTools')) $('submitTools').style.display=on?'inline':'none';
    if($('submitGate'))  $('submitGate').style.display=on?'none':'inline';
    if($('ownerToggle')) $('ownerToggle').textContent=on?'owner ✓ (exit)':'owner'; }
  $('ownerToggle').onclick=function(e){ e.preventDefault();
    if(isOwner()){ try{ localStorage.removeItem('lop_owner'); }catch(e){} applyOwnerUI(); return; }
    var p=window.prompt('Owner passphrase (project team only):','');
    if(p!=null){ if(p.trim().toLowerCase()==='truckster'){ try{ localStorage.setItem('lop_owner','1'); }catch(e){} applyOwnerUI(); }
      else alert('Not recognized. Submissions to ExoFOP are handled by the project team.'); } };
  applyOwnerUI();
  $('pick').onchange=function(){ var id=this.value; card=DECK.filter(function(c){return c.id===id;})[0]||null; cons=null; render(); var u=new URL(location.href); u.searchParams.set('id',id); history.replaceState(null,'',u); };

  fetch('frontier_curves.json',{cache:'no-store'}).then(function(r){ return r.ok?r.json():[]; }).then(function(d){
    DECK=(Array.isArray(d)?d:[]).filter(function(c){ return c&&c.id&&Array.isArray(c.f); });
    DECK.sort(function(a,b){ return String(a.id).localeCompare(String(b.id)); });
    var sel=$('pick'); sel.innerHTML=DECK.map(function(c){ return '<option value="'+esc(c.id)+'">'+esc(c.id)+(c.constellation?(' · '+esc(c.constellation)):'')+'</option>'; }).join('');
    var want=new URL(location.href).searchParams.get('id');
    var start = (want && DECK.filter(function(c){return c.id===want;})[0]) ? want : (DECK[0]&&DECK[0].id);
    if(start){ sel.value=start; card=DECK.filter(function(c){return c.id===start;})[0]; render(); }
    else { $('reportBody').innerHTML='<p class="empty">No real candidates available.</p>'; }
  }).catch(function(){ $('reportBody').innerHTML='<p class="empty">Could not load the candidate deck.</p>'; });
})();
</script>
</body>
